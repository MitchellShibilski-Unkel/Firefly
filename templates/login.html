<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Firefly - Login</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>

    <body>
        <div class="shows glass-panel" style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <form method="POST" action="/login" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
                <h2 class="ptext" style="text-align: center;">Password</h2>
                <input type="password" name="passwd" value="" style="width: 100%; box-sizing: border-box;">
                <button type="submit" style="margin-top: 20px;">Submit</button>
            </form>
        </div>
    </body>

</html>
