<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Firefly</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>

    <body>
        <div class="shows glass-panel" style="margin-right: 70%;">
            <h3 style="margin-left: 0px;"><strong>{{ title }}</strong></h3>
            <hr>
            <p><strong>Description:</strong> {{ description }}</p>
            <p><strong>Genre:</strong> {{ genre }}</p>
            <p><strong>Release Date:</strong> {{ release }}</p>
            <p><strong>Time:</strong> {{ time }}</p>
            <button type="button" id="playBtn" onclick="window.location.href='/player/{{ movie }}'">Play</button>
        </div>

        <button type="button" onclick="window.location.href='/index'">Back to Home</button>

        <script>
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (!k.startsWith("progress_")) continue;
                try {
                    const data = JSON.parse(localStorage.getItem(k));
                    if ((data.movie === "{{ movie }}" || data.title === "{{ movie }}") && data.time > 0) {
                        document.getElementById("playBtn").textContent = "Resume";
                        break;
                    }
                } catch (e) {}
            }
        </script>

    </body>

</html>
