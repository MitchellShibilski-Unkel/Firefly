<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Firefly</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        <div class="header glass-panel">
            <h1>Upload Media</h1>
        </div>

        <div class="upload-form glass-panel">
            <form action="/upload" method="post" enctype="multipart/form-data" style="margin: 20px;">
                <label for="title">Title:</label> <br><br>
                <input type="text" id="title" name="title" placeholder="Enter title"> <br><br>
                <label for="type">Type:</label> <br> <br>
                <select id="type" name="type" onchange="toggleTV(this)">
                    <option value="movie">Movie</option>
                    <option value="tv">TV Show</option>
                </select> <br><br>

                <div id="tvOptions" style="display:none;">
                    <label for="season">Season:</label> <br><br>
                    <input type="number" id="season" name="season" placeholder="Season number" min="1"> <br><br>
                    <label for="episode">Episode:</label> <br><br>
                    <input type="number" id="episode" name="episode" placeholder="Episode number" min="1"> <br><br>
                </div>
                <label for="file">Select media file:</label> <br> <br>
                <input type="file" id="file" name="file" required> <br><br>
                <button type="submit">Upload</button>
            </form>
        </div>
        
    </body>

<script>
    function toggleTV(select) {
        document.getElementById("tvOptions").style.display = select.value === "tv" ? "block" : "none";
    }
</script>

</html>
