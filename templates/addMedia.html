<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Firefly</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        <div class="header glass-panel">
            <h1>Upload Media</h1>
        </div>

        <div class="upload-form glass-panel">
            <form action="/upload" method="post" enctype="multipart/form-data" style="margin: 20px;">
                <label for="title">Title:</label> <br><br>
                <input type="text" id="title" name="title" placeholder="Enter title"> <br><br>
                <label for="type">Type:</label> <br> <br>
                <select id="type" name="type">
                    <option value="movie">Movie</option>
                    <option value="tv">TV Show</option>
                </select> <br><br>
                <label for="file">Select media file:</label> <br> <br>
                <input type="file" id="file" name="file" required> <br><br>
                <button type="submit">Upload</button>
            </form>
        </div>
        
    </body>
</html>
