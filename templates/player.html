<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Firefly</title>
      <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
      <style>
         .exit-btn {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
         }
         .exit-btn:hover { background: rgba(0,0,0,0.85); }
      </style>
   </head>
   <body>
      <button class="exit-btn" onclick="exitPlayer()">&#8592; Back</button>

      <video id="player" controls style="width: 100%; height: 95vh;">
         <source src="/media/movies/{{ filename }}" type="video/mp4">
         Your browser does not support the video tag.
      </video>

      <script>
         const video = document.getElementById("player");
         const key = "progress_{{ filename }}";
         let lastSave = 0;

         function saveProgress() {
            localStorage.setItem(key, JSON.stringify({ time: video.currentTime, title: "{{ title }}", filename: "{{ filename }}", movie: "{{ movie }}" }));
         }

         video.addEventListener("loadedmetadata", () => {
            const saved = localStorage.getItem(key);
            if (saved) {
               const data = JSON.parse(saved);
               if (data.time && data.time > 0) video.currentTime = data.time;
            }
            video.play();
         });

         video.addEventListener("timeupdate", () => {
            const now = Date.now();
            if (now - lastSave >= 5000) {
               saveProgress();
               lastSave = now;
            }
         });

         video.addEventListener("pause", () => { saveProgress(); });

         video.addEventListener("ended", () => { localStorage.removeItem(key); });

         window.addEventListener("beforeunload", () => { saveProgress(); });

         function exitPlayer() {
            video.pause();
            saveProgress();
            window.location.href = "/index";
         }
      </script>
   </body>
</html>
